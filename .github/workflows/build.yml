name: Build GNUstep FM AppImage

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gnustep gnustep-make gnustep-base-runtime \
            gnustep-gui-runtime gobjc wget patchelf

    - name: Build GNUstep FM
      run: |
        . /usr/share/GNUstep/Makefiles/GNUstep.sh
        make
        make install INSTALL_ROOT=$PWD/AppDir/usr

    - name: Setup AppDir
      run: |
        mkdir -p AppDir
        # copy desktop and icon
        cp resources/fm.desktop AppDir/
        cp resources/fm.png AppDir/

        # create AppRun
        echo -e '#!/bin/bash\nHERE="$(dirname "$(readlink -f "${0}")")"\nexport LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"\n"$HERE/usr/bin/fm"' > AppDir/AppRun
        chmod +x AppDir/AppRun

    - name: Download AppImageTool
      run: |
        wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage

    - name: Build AppImage
      run: |
        ./appimagetool-x86_64.AppImage AppDir

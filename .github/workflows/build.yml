name: Build GNUstep FM AppImage

on:
  workflow_dispatch:   # allows running from GitHub web interface
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install GNUstep and dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gnustep gnustep-make gnustep-base-runtime gnustep-gui-runtime \
            gobjc wget patchelf desktop-file-utils libgtk-3-dev build-essential

      # 3. Setup GNUstep environment
      - name: Setup GNUstep environment
        run: |
          . /usr/share/GNUstep/Makefiles/GNUstep.sh
          echo "GNUstep environment ready"

      # 4. Build the GNUstep File Manager
      - name: Build GNUstep File Manager
        run: |
          . /usr/share/GNUstep/Makefiles/GNUstep.sh
          mkdir -p build
          cd build
          make -C ../
          make -C ../ install INSTALL_ROOT=$PWD/AppDir/usr

      # 5. Setup AppDir and flush-left AppRun
      - name: Setup AppDir
        run: |
          mkdir -p build/AppDir
          cp resources/fm.desktop build/AppDir/
          cp resources/fm.png build/AppDir/

          # flush-left AppRun
          printf '%s\n' '#!/bin/bash' \
          'HERE="$(dirname "$(readlink -f "${0}")")"' \
          'export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"' \
          '"$HERE/usr/bin/fm"' > build/AppDir/AppRun
          chmod +x build/AppDir/AppRun

      # 6. Download AppImageTool
      - name: Download AppImageTool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      # 7. Build the AppImage
      - name: Build AppImage
        run: |
          ./appimagetool-x86_64.AppImage build/AppDir

      # 8. Upload AppImage as artifact
      - name: Upload AppImage
        uses: actions/upload-artifact@v3
        with:
          name: GNUstep-FM-AppImage
          path: build/*.AppImage

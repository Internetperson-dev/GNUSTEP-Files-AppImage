name: Build GWorkspace AppImage

on:
  workflow_dispatch:  # allows manual run
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf automake libtool gobjc \
          gnustep gnustep-make gnustep-base-runtime gnustep-gui-runtime \
          gnustep-libobjc2-runtime wget patchelf libgtk-3-dev libsqlite3-dev

    - name: Setup GNUstep environment
      run: |
        . /usr/share/GNUstep/Makefiles/GNUstep.sh
        echo "GNUstep ready"

    - name: Configure and Build
      run: |
        . /usr/share/GNUstep/Makefiles/GNUstep.sh
        ./configure
        make -j$(nproc)
        DESTDIR=$PWD/AppDir/usr make install

    - name: Build AppDir
      run: |
        mkdir -p AppDir
        # copy .desktop and icon from repo if present
        cp Resources/GWorkspace.desktop AppDir/ || true
        cp Resources/GWorkspace.png AppDir/ || true

        # flush-left AppRun
        printf '%s\n' '#!/bin/bash' \
        'HERE="$(dirname "$(readlink -f "${0}")")"' \
        'export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"' \
        '"$HERE/usr/bin/GWorkspace"' > AppDir/AppRun
        chmod +x AppDir/AppRun

    - name: Download AppImageTool
      run: |
        wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage

    - name: Build AppImage
      run: |
        ./appimagetool-x86_64.AppImage AppDir

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: GWorkspace-AppImage
        path: "*.AppImage"

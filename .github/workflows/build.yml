name: Build GNUstep File Manager AppImage

on:
  workflow_dispatch:  # allows manual run
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CC: /usr/bin/clang
      CXX: /usr/bin/clang++
      PATH: /usr/local/bin:$PATH
      LD_LIBRARY_PATH: /usr/local/lib:$LD_LIBRARY_PATH
      LD: /usr/bin/ld.lld
      LDFLAGS: -fuse-ld=/usr/bin/ld.lld

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang lld git cmake make pkg-config build-essential gobjc \
          gnutls-bin libffi-dev libxml2-dev libxslt1-dev libgnutls28-dev \
          zlib1g-dev libavahi-client-dev libicu-dev tzdata libcurl4-openssl-dev \
          desktop-file-utils libgtk-3-dev wget

    # -----------------------------
    # 1. Build libobjc2
    - name: Build libobjc2
      run: |
        git clone --recurse-submodules --branch 2.0 https://github.com/gnustep/libobjc2
        cd libobjc2
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=RelWithDebInfo
        sudo make install
        cd ../..

    # -----------------------------
    # 2. Build libdispatch
    - name: Build libdispatch
      run: |
        git clone --branch swift-6.3 https://github.com/apple/swift-corelibs-libdispatch
        cd swift-corelibs-libdispatch
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=RelWithDebInfo -DINSTALL_PRIVATE_HEADERS=YES
        sudo make install
        cd ../..

    # -----------------------------
    # 3. Build GNUstep Make
    - name: Build GNUstep Make
      run: |
        git clone --branch 2.9 https://github.com/gnustep/tools-make
        cd tools-make
        ./configure \
          --with-layout=fhs \
          --enable-native-objc-exceptions \
          --enable-objc-arc \
          --enable-install-ld-so-conf \
          --enable-debug-by-default
        sudo make install
        cd ..

    # -----------------------------
    # 4. Build GNUstep Base
    - name: Build GNUstep Base
      run: |
        source /usr/local/share/GNUstep/Makefiles/GNUstep.sh
        git clone --branch 2.9 https://github.com/gnustep/libs-base
        cd libs-base
        ./configure
        sudo make install
        cd ..

    # -----------------------------
    # 5. Build GNUstep File Manager
    - name: Build File Manager
      run: |
        source /usr/local/share/GNUstep/Makefiles/GNUstep.sh
        mkdir -p build
        cd build
        make -C ../
        make -C ../ install INSTALL_ROOT=$PWD/AppDir/usr

    # -----------------------------
    # 6. Setup AppDir and AppRun
    - name: Setup AppDir
      run: |
        mkdir -p build/AppDir
        # copy desktop file and icon if present
        cp resources/fm.desktop build/AppDir/ || true
        cp resources/fm.png build/AppDir/ || true

        # create flush-left AppRun
        printf '%s\n' '#!/bin/bash' \
        'HERE="$(dirname "$(readlink -f "${0}")")"' \
        'export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"' \
        '"$HERE/usr/bin/fm"' > build/AppDir/AppRun
        chmod +x build/AppDir/AppRun

    # -----------------------------
    # 7. Download AppImageTool
    - name: Download AppImageTool
      run: |
        wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage

    # -----------------------------
    # 8. Build AppImage
    - name: Build AppImage
      run: |
        ./appimagetool-x86_64.AppImage build/AppDir

    # -----------------------------
    # 9. Upload AppImage as artifact
    - name: Upload AppImage
      uses: actions/upload-artifact@v3
      with:
        name: GNUstep-FM-AppImage
        path: build/*.AppImage
